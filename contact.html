<section id="contact" class="section section-alt">
  <div class="container">
    <div class="card contact-box">
      <span class="eyebrow">CONTACT</span>
      <h2 class="section-title">まずはお気軽にご相談ください</h2>

      <p class="section-lead">
        新規事業、AI活用、現場改善など、課題が明確でなくても大丈夫です。<br>
        内容を整理しながら最適な支援をご提案します。
      </p>

      <p style="margin-bottom:20px; font-weight:700; color:#1f6fb2;">
        ✔ 初回相談無料　✔ 無理な営業は行いません　✔ 30秒で送信できます
      </p>

      <form action="https://formspree.io/f/xwvajool" method="POST" class="contact-form">

        <div class="form-group">
          <label>お名前（必須）</label>
          <input type="text" name="name" required>
        </div>

        <div class="form-group">
          <label>メールアドレス（必須）</label>
          <input type="email" name="email" required>
        </div>

        <div class="form-group">
          <label>会社名（任意）</label>
          <input type="text" name="company">
        </div>

        <div class="form-group">
          <label>電話番号（任意）</label>
          <input type="tel" name="phone">
        </div>

        <div class="form-group">
          <label>ご相談内容（必須）</label>
          <textarea name="message" rows="5" placeholder="例：AI活用について相談したい／新規事業について検討したい" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:10px;">
          無料相談を送信する
        </button>

      </form>
    </div>
  </div>
</section>
