<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西三河地区</title>

<style>
:root {
  --main-color:#379B63;
  --main-dark:#2F7D52;
  --main-light:#E8F5EE;
  --main-text-color:#fff;
}

body {font-family:sans-serif;margin:0;}

.site-header{background:#fff;border-bottom:1px solid #ddd;padding:10px 20px;}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.university-logo{height:40px;}

.section{padding:30px;}

.data-policy-box{
  background:var(--main-color);
  color:var(--main-text-color);
  padding:15px;
  border-radius:10px;
}

.stat-card{
  border:1px solid #ddd;
  padding:10px;
  margin:10px;
  display:inline-block;
  width:150px;
}

.managed-data-card{
  border:1px solid #ddd;
  padding:15px;
  margin:10px;
}
</style>
</head>

<body>

<header class="site-header">
<div class="header-inner">
<div>
<img class="university-logo" id="logo">
<span id="title">大学ポータル</span>
</div>
<a href="index.html">戻る</a>
</div>
</header>

<div class="section">
<h2 id="mikawaIntroTitle">読み込み中</h2>
<p id="mikawaIntroDescription"></p>

<div class="data-policy-box">
<h3 id="mikawaPolicyTitle"></h3>
<p id="mikawaPolicyBody"></p>
<p id="mikawaLastUpdated"></p>
</div>

<div id="mikawaStatsGrid"></div>
</div>

<div class="section">
<h2>データで見る西三河</h2>
<p id="mikawaDataNote"></p>
<div id="mikawaManagedDataGrid"></div>
</div>

<script src="js/nishi-mikawa-data.js"></script>
</body>
</html>
